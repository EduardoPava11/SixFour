name: spec-codegen drift

on:
  push:
    branches: [main]
  pull_request:

jobs:
  drift:
    name: Generated/ matches Haskell spec
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.2.8'
          cabal-version: '3.10'

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: ~/.cabal/store
          key: cabal-${{ runner.os }}-9.2.8-${{ hashFiles('spec/spec.cabal', 'spec/cabal.project') }}
          restore-keys: cabal-${{ runner.os }}-9.2.8-

      - name: Run spec-codegen
        run: |
          cd spec
          cabal update
          cabal run -v0 spec-codegen

      - name: Verify Generated/ has not drifted
        run: |
          if ! git diff --quiet -- SixFour/Generated/ trainer/generated/ SixFour/Resources/stbn3d-8.bin; then
            echo "::error::SixFour/Generated/, trainer/generated/, or SixFour/Resources/stbn3d-8.bin differs from spec output."
            git diff -- SixFour/Generated/ trainer/generated/ SixFour/Resources/stbn3d-8.bin
            exit 1
          fi

      - name: Run Haskell property tests
        run: |
          cd spec
          cabal test
