<svg xmlns="http://www.w3.org/2000/svg" width="400" height="872" viewBox="0 0 400 872" font-family="ui-monospace, Menlo, monospace">
  <!-- ============================================================= -->
  <!-- ACT IV — RENDER. One surface, cell updates only.              -->
  <!-- Canvas 400x872 pt (1 unit = 1 pt). Atom = 4 pt.               -->
  <!-- Field64 @ (col18,row22) = x72..328 y88..344.                  -->
  <!-- Palette16 @ (col42,row145) = x168..232 y580..644.            -->
  <!-- DiversityRing @ (col40,row170) = x160..240 y680..760.        -->
  <!-- ============================================================= -->
  <defs>
    <clipPath id="screen"><rect x="0" y="0" width="400" height="872" rx="56" ry="56"/></clipPath>
    <!-- faint 4pt cell grid -->
    <pattern id="cells" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M4 0 H0 V4" fill="none" stroke="#1c1c22" stroke-width="0.4"/>
    </pattern>
    <linearGradient id="sweep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2f3a"/>
      <stop offset="100%" stop-color="#14161c"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#screen)">
    <!-- ground: near-black living checker -->
    <rect x="0" y="0" width="400" height="872" fill="#0a0a0c"/>
    <rect x="0" y="0" width="400" height="872" fill="url(#cells)"/>

    <!-- ===================== TOP STAGE BANNER (rows 9..24, below Dynamic Island) ===================== -->
    <!-- σ token strip — cell strip, NOT glass. Pinned at top:36pt -->
    <g>
      <rect x="12" y="144" width="244" height="40" fill="#14141a"/>
      <text x="24" y="162" fill="#ffffff" font-size="11" font-weight="600">rendering:significance</text>
      <text x="24" y="178" fill="#9696a2" font-size="9">Backing every slot with pixels</text>
    </g>
    <!-- build stamp top-left -->
    <text x="12" y="178" fill="#78788422" font-size="7">9a8d319 · 06-08 14:22</text>

    <!-- ===================== STAGE PIPELINE LADDER (LEFT gutter, cols 0..17 = x0..72) ===================== -->
    <!-- 5 stage cells stacked; current=lit, done=filled, pending=ghost. -->
    <g font-size="6.5" text-anchor="middle">
      <text x="36" y="210" fill="#5a5a66" font-size="7">STAGES</text>
      <!-- quantize DONE -->
      <rect x="20" y="220" width="32" height="32" fill="#2f6b3a"/>
      <text x="36" y="240" fill="#bfe8c8">1</text>
      <text x="36" y="262" fill="#7aa884" font-size="5.5">quant</text>
      <!-- dither DONE -->
      <rect x="20" y="272" width="32" height="32" fill="#2f6b3a"/>
      <text x="36" y="292" fill="#bfe8c8">2</text>
      <text x="36" y="314" fill="#7aa884" font-size="5.5">dither</text>
      <!-- significance CURRENT (pulsing accent) -->
      <rect x="18" y="322" width="36" height="36" fill="#c8a23a"/>
      <rect x="18" y="322" width="36" height="36" fill="none" stroke="#ffe9a0" stroke-width="1.5"/>
      <text x="36" y="344" fill="#241c00" font-weight="700">3</text>
      <text x="36" y="368" fill="#ffe9a0" font-size="5.5">signif</text>
      <!-- palette PENDING -->
      <rect x="20" y="376" width="32" height="32" fill="#1a1a20"/>
      <text x="36" y="396" fill="#44444e">4</text>
      <text x="36" y="418" fill="#44444e" font-size="5.5">palet</text>
      <!-- encode PENDING -->
      <rect x="20" y="428" width="32" height="32" fill="#1a1a20"/>
      <text x="36" y="448" fill="#44444e">5</text>
      <text x="36" y="470" fill="#44444e" font-size="5.5">encod</text>
    </g>

    <!-- ===================== FIELD64 — RESOLVE HERO (col18,row22 → x72 y88, 256x256pt) ===================== -->
    <!-- The GIFA-in-progress under the serpentine resolve sweep. -->
    <g>
      <!-- frame underneath (resolved region: lower-left already revealed) -->
      <rect x="72" y="88" width="256" height="256" fill="#0d0d10"/>
      <!-- sample of resolved image cells (illustrative palette swatches) -->
      <g>
        <rect x="72"  y="216" width="128" height="128" fill="#3a5a78"/>
        <rect x="104" y="248" width="64"  height="64"  fill="#6a8aa8"/>
        <rect x="72"  y="280" width="64"  height="64"  fill="#284a64"/>
        <rect x="136" y="216" width="64"  height="32"  fill="#88a0b8"/>
      </g>
      <!-- serpentine sweep front: ghost cover over UNRESOLVED cells (upper + right band) -->
      <path d="M72 88 H328 V216 H200 V344 H72 Z" fill="url(#sweep)" opacity="0.97"/>
      <!-- the live serpentine front edge (bright cell row, S-order) -->
      <g fill="#ffe9a0">
        <rect x="196" y="212" width="4" height="4"/>
        <rect x="200" y="212" width="4" height="4"/>
        <rect x="324" y="208" width="4" height="4"/>
        <rect x="320" y="208" width="4" height="4"/>
      </g>
      <!-- field64 outline + label -->
      <rect x="72" y="88" width="256" height="256" fill="none" stroke="#34343e" stroke-width="1"/>
      <text x="76" y="102" fill="#8a8a96" font-size="8">Field64 — 64×64 cells · 256 pt</text>
      <text x="76" y="338" fill="#7aa884" font-size="7">resolve sweep · serpentine · ghost over unresolved</text>
    </g>

    <!-- ===================== MID DATA REGION (rows 86..144 → y344..580) ===================== -->
    <!-- per-stage live metric readout — fills the big empty band under Field64. -->
    <g>
      <text x="72" y="372" fill="#5a5a66" font-size="7">DETERMINISTIC CORE · LIVE METRIC</text>
      <!-- frame counter (significance stage: slots backed) -->
      <text x="72" y="392" fill="#cfcfd8" font-size="9">slots backed</text>
      <text x="248" y="392" fill="#ffe9a0" font-size="9" text-anchor="end">214 / 256</text>
      <!-- 16x16 mini-grid mirror of which slots are significant (data: Spec.Significance) -->
      <g>
        <rect x="72" y="404" width="128" height="128" fill="#101014"/>
        <!-- filled significant slots -->
        <g fill="#2f6b3a">
          <rect x="72" y="404" width="80" height="64"/>
          <rect x="72" y="468" width="48" height="48"/>
          <rect x="152" y="404" width="32" height="48"/>
        </g>
        <!-- not-yet-significant slots -->
        <g fill="#3a2f1a">
          <rect x="120" y="468" width="80" height="48"/>
          <rect x="184" y="404" width="16" height="64"/>
        </g>
        <rect x="72" y="404" width="128" height="128" fill="none" stroke="#2a2a32" stroke-width="0.5"/>
        <text x="208" y="416" fill="#7a7a86" font-size="6">16×16 slot map</text>
        <text x="208" y="430" fill="#7aa884" font-size="6">green = ≥ minPop</text>
        <text x="208" y="444" fill="#b58a4a" font-size="6">amber = donating</text>
        <text x="208" y="468" fill="#5a5a66" font-size="6">source:</text>
        <text x="208" y="480" fill="#5a5a66" font-size="6">Spec.Significance</text>
      </g>
      <!-- per-stage progress ticks (5 segments, current partway) -->
      <g>
        <rect x="72" y="546" width="256" height="8" fill="#16161c"/>
        <rect x="72"  y="546" width="51.2" height="8" fill="#2f6b3a"/>
        <rect x="123" y="546" width="51.2" height="8" fill="#2f6b3a"/>
        <rect x="174" y="546" width="33"  height="8" fill="#c8a23a"/>
        <g stroke="#0a0a0c" stroke-width="1">
          <line x1="123" y1="546" x2="123" y2="554"/>
          <line x1="174" y1="546" x2="174" y2="554"/>
          <line x1="225" y1="546" x2="225" y2="554"/>
          <line x1="277" y1="546" x2="277" y2="554"/>
        </g>
        <text x="72" y="570" fill="#5a5a66" font-size="6">5 stages · each owns 1/5 of the sweep · monotone</text>
      </g>
    </g>

    <!-- ===================== PALETTE16 — STAGE-PALETTE PREVIEW (col42,row145 → x168 y580, 64x64pt) ===================== -->
    <!-- inert during render. Shows the palette AS IT IS BEING COLLAPSED this stage. -->
    <g>
      <rect x="168" y="580" width="64" height="64" fill="#101014"/>
      <!-- 16x16 swatches (current per-stage palette) -->
      <g>
        <rect x="168" y="580" width="32" height="32" fill="#6a8aa8"/>
        <rect x="200" y="580" width="32" height="32" fill="#3a5a78"/>
        <rect x="168" y="612" width="32" height="32" fill="#88a0b8"/>
        <rect x="200" y="612" width="32" height="32" fill="#284a64"/>
      </g>
      <rect x="168" y="580" width="64" height="64" fill="none" stroke="#34343e" stroke-width="1"/>
      <text x="168" y="574" fill="#8a8a96" font-size="7">Palette16 — 16×16 · 64 pt · INERT</text>
      <text x="168" y="660" fill="#7a7a86" font-size="6">draws: current-stage palette (not a button now)</text>
    </g>

    <!-- ===================== DIVERSITYRING (col40,row170 → x160 y680, 80x80pt) ===================== -->
    <!-- coverage gauge: how much LAB volume the collapsing palette covers. -->
    <g>
      <circle cx="200" cy="720" r="38" fill="none" stroke="#1a1a20" stroke-width="8"/>
      <!-- arc ~72% coverage -->
      <path d="M200 682 A38 38 0 1 1 162.5 726" fill="none" stroke="#c8a23a" stroke-width="8" stroke-linecap="round"/>
      <text x="200" y="717" fill="#ffe9a0" font-size="11" text-anchor="middle" font-weight="600">0.72</text>
      <text x="200" y="730" fill="#7a7a86" font-size="6" text-anchor="middle">coverage</text>
      <rect x="160" y="680" width="80" height="80" fill="none" stroke="#26262e" stroke-width="0.5" stroke-dasharray="2 2"/>
      <text x="160" y="674" fill="#8a8a96" font-size="7">DiversityRing — 20×20 · 80 pt</text>
      <text x="160" y="776" fill="#7a7a86" font-size="6">source: Spec.Coverage / Spec.Diversity</text>
    </g>

    <!-- ===================== RIGHT gutter (cols 82..99 → x328..400): encode byte-meter ===================== -->
    <g>
      <text x="384" y="210" fill="#5a5a66" font-size="7" text-anchor="end">GIF</text>
      <text x="384" y="222" fill="#5a5a66" font-size="7" text-anchor="end">BYTES</text>
      <!-- vertical fill bar (LZW output growing during encode stage; ghost now, pre-encode) -->
      <rect x="356" y="232" width="24" height="248" fill="#14141a"/>
      <text x="368" y="360" fill="#44444e" font-size="6" text-anchor="middle" transform="rotate(90 368 360)">encode stage fills</text>
      <rect x="356" y="232" width="24" height="248" fill="none" stroke="#26262e" stroke-width="0.5"/>
    </g>

    <!-- ===================== BOTTOM: NO RETAKE / NO TAP — render is non-interactive ===================== -->
    <text x="200" y="820" fill="#5a5a66" font-size="7" text-anchor="middle">no gesture · render is a cell transform · advances on stageDone:* events</text>

    <!-- screen frame -->
    <rect x="0.5" y="0.5" width="399" height="871" rx="56" ry="56" fill="none" stroke="#2a2a32" stroke-width="1"/>
  </g>
</svg>
