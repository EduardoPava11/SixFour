<svg xmlns="http://www.w3.org/2000/svg" width="400" height="872" viewBox="0 0 400 872" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <!-- ===================================================================== -->
  <!-- ACT II — CAPTURE (NO FREEZE, BACKWARDS)                                -->
  <!-- One surface. phase = .capturing. The preview does NOT freeze: the      -->
  <!-- 64x64 Field64 plays the GROWING indexCube BACKWARDS (reverse cursor),  -->
  <!-- and the 16x16 Palette16 (the shutter) becomes the burst PROGRESS RING. -->
  <!-- Canvas 400x872 pt, 1 unit = 1 pt. Rounded screen rx=56.                -->
  <!-- ===================================================================== -->

  <defs>
    <clipPath id="screen"><rect x="0" y="0" width="400" height="872" rx="56" ry="56"/></clipPath>
    <!-- faint 4pt cell grid -->
    <pattern id="cells" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M4 0 L0 0 L0 4" fill="none" stroke="#1d1d24" stroke-width="0.4"/>
    </pattern>
    <!-- captured-frames tint (reverse playback look) -->
    <linearGradient id="rev" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#11202e"/>
      <stop offset="0.5" stop-color="#1c3450"/>
      <stop offset="1" stop-color="#2a4f74"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#screen)">
    <!-- ground: heartbeat checker (palette-tinted), drawn faint -->
    <rect x="0" y="0" width="400" height="872" fill="#0a0a0d"/>
    <rect x="0" y="0" width="400" height="872" fill="url(#cells)"/>

    <!-- ===== EMPTY-REGION DATA SKETCHES (ranked fills, see notes) ========= -->

    <!-- [R1] TOP STRIP rows 0-21 : reverse-cursor frame readout "t = 41 / 64 captured" + tiny timeline -->
    <g>
      <rect x="72" y="48" width="256" height="28" rx="4" fill="#101018"/>
      <text x="80" y="66" fill="#7fd6ff" font-size="11" font-weight="600">CAPTURING  -  playing back</text>
      <text x="320" y="66" fill="#9aa" font-size="11" text-anchor="end">41 / 64</text>
      <!-- 64-tick burst timeline: filled = captured, cursor arrow plays LEFT (backwards) -->
      <g transform="translate(72,80)">
        <rect x="0" y="0" width="256" height="6" fill="#15151c"/>
        <rect x="0" y="0" width="164" height="6" fill="#2a4f74"/>
        <polygon points="158,-3 172,-3 165,9" fill="#7fd6ff"/>
        <text x="0" y="20" fill="#556" font-size="8">t=0</text>
        <text x="256" y="20" fill="#556" font-size="8" text-anchor="end">t=63</text>
        <text x="128" y="20" fill="#557" font-size="8" text-anchor="middle">reverse cursor scans captured frames -&gt;&gt;</text>
      </g>
    </g>

    <!-- ===== FIELD64 : the preview hero, NOT frozen ====================== -->
    <!-- col 18,row 22 -> x=72,y=88 ; 64x64 cells @4pt = 256x256 pt -->
    <g>
      <rect x="72" y="88" width="256" height="256" fill="url(#rev)"/>
      <!-- sketch of indexed cells (captured frame, mid-playback) -->
      <g opacity="0.5">
        <rect x="72"  y="88"  width="64" height="64" fill="#34618c"/>
        <rect x="200" y="88"  width="80" height="48" fill="#43719c"/>
        <rect x="120" y="180" width="96" height="72" fill="#28425f"/>
        <rect x="248" y="220" width="56" height="80" fill="#3c6388"/>
        <rect x="88"  y="280" width="120" height="40" fill="#1f3247"/>
      </g>
      <!-- the GROWING front: cells beyond the captured count are GHOST (not yet landed) -->
      <rect x="72" y="300" width="256" height="44" fill="#0c0c10" opacity="0.86"/>
      <text x="200" y="326" fill="#3a4a5a" font-size="10" text-anchor="middle">ghost: frames t&gt;41 not yet ingested</text>

      <!-- labels -->
      <rect x="72" y="88" width="256" height="256" fill="none" stroke="#2f5b82" stroke-width="1.5"/>
      <text x="200" y="104" fill="#bfe6ff" font-size="11" text-anchor="middle" font-weight="700">Field64  -  64x64 cells = 256x256 pt</text>
      <text x="200" y="118" fill="#7fb8e0" font-size="9" text-anchor="middle">REVERSE-CURSOR playback over growing indexCube</text>
      <text x="76" y="338" fill="#557" font-size="8">col 18, row 22  -  inert (no gesture this act)</text>
    </g>

    <!-- [R2] LEFT/RIGHT GUTTERS cols 0-17 / 82-99 : per-frame diversity sparkline + ISO/EV lock chips -->
    <g font-size="8" fill="#46566a">
      <!-- left rail: 64 thin bars = per-frame coverage as frames land (fills bottom->top? no: top->down with cursor) -->
      <rect x="20" y="120" width="40" height="200" fill="#0d0d13"/>
      <text x="40" y="116" fill="#667" font-size="8" text-anchor="middle">coverage/frame</text>
      <g fill="#2a6fae">
        <rect x="24" y="300" width="32" height="14"/>
        <rect x="24" y="282" width="28" height="14"/>
        <rect x="24" y="264" width="34" height="14"/>
        <rect x="24" y="246" width="22" height="14"/>
        <rect x="24" y="228" width="30" height="14"/>
        <rect x="24" y="210" width="26" height="14"/>
        <rect x="24" y="192" width="33" height="14"/>
        <rect x="24" y="174" width="20" height="14"/>
        <rect x="24" y="156" width="29" height="14"/>
        <rect x="24" y="138" width="24" height="14"/>
      </g>
      <!-- right rail: locked capture params (frozen at lockComplete) -->
      <rect x="340" y="120" width="44" height="200" fill="#0d0d13"/>
      <text x="362" y="116" fill="#667" font-size="8" text-anchor="middle">locked</text>
      <text x="362" y="140" fill="#8aa" font-size="9" text-anchor="middle">ISO</text>
      <text x="362" y="152" fill="#cde" font-size="10" text-anchor="middle" font-weight="700">400</text>
      <text x="362" y="176" fill="#8aa" font-size="9" text-anchor="middle">1/EV</text>
      <text x="362" y="188" fill="#cde" font-size="10" text-anchor="middle" font-weight="700">120</text>
      <text x="362" y="212" fill="#8aa" font-size="9" text-anchor="middle">WB</text>
      <text x="362" y="224" fill="#cde" font-size="10" text-anchor="middle" font-weight="700">5200K</text>
    </g>

    <!-- [R3] MID BAND rows 86-144 (y=344..580) : the 64-frame FILMSTRIP of landed frames -->
    <g>
      <rect x="72" y="356" width="256" height="200" fill="#0b0b10"/>
      <text x="80" y="372" fill="#778" font-size="10">landed frames (newest at right, cursor reads RIGHT-&gt;LEFT)</text>
      <!-- 8x8 thumbnail lattice of captured frames; ghost ones dimmed -->
      <g>
        <!-- captured 42 of 64: fill row-major, last ~22 are ghost -->
        <g fill="#274a6c">
          <!-- captured thumbnails -->
          <rect x="80"  y="384" width="26" height="26"/><rect x="112" y="384" width="26" height="26"/>
          <rect x="144" y="384" width="26" height="26"/><rect x="176" y="384" width="26" height="26"/>
          <rect x="208" y="384" width="26" height="26"/><rect x="240" y="384" width="26" height="26"/>
          <rect x="272" y="384" width="26" height="26"/><rect x="304" y="384" width="14" height="26"/>
          <rect x="80"  y="416" width="26" height="26"/><rect x="112" y="416" width="26" height="26"/>
          <rect x="144" y="416" width="26" height="26"/><rect x="176" y="416" width="26" height="26"/>
          <rect x="208" y="416" width="26" height="26"/><rect x="240" y="416" width="26" height="26"/>
          <rect x="272" y="416" width="26" height="26"/><rect x="304" y="416" width="14" height="26"/>
        </g>
        <!-- the cursor frame highlight -->
        <rect x="208" y="384" width="26" height="26" fill="none" stroke="#7fd6ff" stroke-width="2"/>
        <text x="221" y="402" fill="#cff" font-size="8" text-anchor="middle">41</text>
        <!-- ghost (not-yet-captured) thumbnails -->
        <g fill="#14141b">
          <rect x="80"  y="448" width="26" height="26"/><rect x="112" y="448" width="26" height="26"/>
          <rect x="144" y="448" width="26" height="26"/><rect x="176" y="448" width="26" height="26"/>
          <rect x="208" y="448" width="26" height="26"/><rect x="240" y="448" width="26" height="26"/>
          <rect x="272" y="448" width="26" height="26"/><rect x="304" y="448" width="14" height="26"/>
          <rect x="80"  y="480" width="26" height="26"/><rect x="112" y="480" width="26" height="26"/>
          <rect x="144" y="480" width="26" height="26"/><rect x="176" y="480" width="26" height="26"/>
          <rect x="208" y="480" width="26" height="26"/><rect x="240" y="480" width="26" height="26"/>
          <rect x="272" y="480" width="26" height="26"/><rect x="304" y="480" width="14" height="26"/>
        </g>
        <text x="80" y="528" fill="#445" font-size="8">ghost rows fill as the burst lands (t=42..63)</text>
      </g>
    </g>

    <!-- ===== PALETTE16 : the shutter, now the PROGRESS RING ============== -->
    <!-- col 42,row 145 -> x=168,y=580 ; 16x16 cells @4pt = 64x64 pt -->
    <g>
      <!-- progress ARC around the 16x16 (captured fraction = 41/64) -->
      <circle cx="200" cy="612" r="44" fill="none" stroke="#15151c" stroke-width="6"/>
      <!-- ~64% arc, sweeping -->
      <path d="M 200 568 A 44 44 0 1 1 161 633" fill="none" stroke="#2a8fdc" stroke-width="6" stroke-linecap="round"/>
      <!-- the 16x16 palette grid itself: filled in rank order, tail = ghost -->
      <rect x="168" y="580" width="64" height="64" fill="#1a2c40"/>
      <g fill="#2f5f8c">
        <rect x="168" y="580" width="64" height="40"/>
      </g>
      <rect x="168" y="620" width="64" height="24" fill="#0e0e14"/>
      <rect x="168" y="580" width="64" height="64" fill="none" stroke="#2f5b82" stroke-width="1.5"/>
      <text x="200" y="660" fill="#bfe6ff" font-size="10" text-anchor="middle" font-weight="700">Palette16  -  16x16 = 64x64 pt</text>
      <text x="200" y="672" fill="#7fb8e0" font-size="9" text-anchor="middle">SHUTTER -&gt; burst PROGRESS (256-cell rank fill + arc)</text>
      <text x="200" y="556" fill="#cff" font-size="11" text-anchor="middle" font-weight="700">41 / 64</text>
    </g>

    <!-- ===== DIVERSITYRING (docked under palette) ======================== -->
    <!-- col 40,row 170 -> x=160,y=680 ; 20x20 cells @4pt = 80x80 pt -->
    <g>
      <rect x="160" y="680" width="80" height="80" fill="none" stroke="#243042" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="200" y="724" fill="#46566a" font-size="9" text-anchor="middle">DiversityRing 20x20 = 80pt</text>
      <text x="200" y="736" fill="#46566a" font-size="8" text-anchor="middle">[R4] running LAB-coverage gauge</text>
    </g>

    <!-- [R5] BELOW rows 161-189 (y=644..756 spare) : haptic legend / capture cadence -->
    <g font-size="8" fill="#46566a">
      <rect x="72" y="780" width="256" height="60" rx="6" fill="#0d0d13"/>
      <text x="80" y="796" fill="#778" font-size="9" font-weight="600">cadence + feel (this act)</text>
      <text x="80" y="812" fill="#8aa">- CellTick haptic per frame landed (64 ticks total)</text>
      <text x="80" y="826" fill="#8aa">- reverse cursor advances 1 frame / 20fps tick (kappa)</text>
    </g>

    <!-- screen border -->
    <rect x="0.75" y="0.75" width="398.5" height="870.5" rx="55" ry="55" fill="none" stroke="#2a2a33" stroke-width="1.5"/>
  </g>
</svg>
