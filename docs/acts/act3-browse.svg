<svg xmlns="http://www.w3.org/2000/svg" width="400" height="872" viewBox="0 0 400 872" font-family="ui-monospace, Menlo, monospace">
  <!-- ====================================================================== -->
  <!-- ACT III — BROWSE & PICK FOUR                                           -->
  <!-- Canvas 400x872 pt (1pt = 1 unit). Screen with rounded corners rx=56.   -->
  <!-- Lattice: gifPx = 4pt atom; cols=100 (=400pt), rows=218 (=872pt).       -->
  <!-- NEW phase .browsing (Field64 INTERACTIVE = scrubber+selector).         -->
  <!-- One surface: this is a CELL-GRID CONFIGURATION, not a new screen.       -->
  <!-- ====================================================================== -->

  <defs>
    <clipPath id="screen"><rect x="0" y="0" width="400" height="872" rx="56" ry="56"/></clipPath>
    <!-- faint 4pt cell grid -->
    <pattern id="cell4" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M4 0 L0 0 0 4" fill="none" stroke="#1c1c22" stroke-width="0.4"/>
    </pattern>
    <!-- 16pt coarse grid (every 4 atoms) for reading widget positions -->
    <pattern id="cell16" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M16 0 L0 0 0 16" fill="none" stroke="#2a2a33" stroke-width="0.5"/>
    </pattern>
  </defs>

  <g clip-path="url(#screen)">
    <!-- ground: the one persistent cell field (heartbeat checker, dimmed) -->
    <rect x="0" y="0" width="400" height="872" fill="#0a0a0d"/>
    <rect x="0" y="0" width="400" height="872" fill="url(#cell4)"/>
    <rect x="0" y="0" width="400" height="872" fill="url(#cell16)"/>

    <!-- ================= TOP STATUS STRIP (rows 14-21, was empty) ========= -->
    <!-- col 0..99 @ y = 14*4=56 .. 21*4=84 ; data: frame counter + phase -->
    <rect x="56" y="56" width="288" height="24" rx="6" fill="#14141a" stroke="#2e2e38" stroke-width="0.6"/>
    <text x="64" y="71" font-size="9" fill="#7fd4ff">BROWSE</text>
    <text x="120" y="71" font-size="9" fill="#9aa">frame</text>
    <text x="156" y="71" font-size="11" fill="#fff" font-weight="bold">23</text>
    <text x="176" y="71" font-size="9" fill="#9aa">/ 64</text>
    <text x="232" y="71" font-size="9" fill="#9aa">picked</text>
    <text x="278" y="71" font-size="11" fill="#5ec85e" font-weight="bold">2</text>
    <text x="294" y="71" font-size="9" fill="#9aa">/ 4</text>

    <!-- ================= FIELD64  (THE SCRUBBER+SELECTOR) ================= -->
    <!-- 64x64 cells @4pt = 256x256 pt. dock col 18 (x=72), row 22 (y=88).   -->
    <!-- col 18 = (100-64)/2  => horizontally centred.                        -->
    <rect x="72" y="88" width="256" height="256" fill="#101014" stroke="#3a6ea5" stroke-width="1.2"/>
    <!-- sketch of the displayed frame (the burst frame at cursor=23) -->
    <g opacity="0.85">
      <rect x="72"  y="88"  width="256" height="64" fill="#26405e"/>
      <rect x="72"  y="152" width="256" height="64" fill="#34597f"/>
      <rect x="72"  y="216" width="256" height="64" fill="#2c4a6c"/>
      <rect x="72"  y="280" width="256" height="64" fill="#1f3650"/>
      <circle cx="200" cy="210" r="52" fill="#c8a24a" opacity="0.7"/>
    </g>
    <!-- swipe affordance arrows (gesture: horizontal swipe = scrub cursor) -->
    <text x="86"  y="220" font-size="22" fill="#ffffff" opacity="0.55">&#8249;</text>
    <text x="304" y="220" font-size="22" fill="#ffffff" opacity="0.55">&#8250;</text>
    <text x="120" y="106" font-size="8" fill="#dfe7ff">swipe = scrub cursor (Z64) &#183; CellTick per frame</text>
    <text x="120" y="334" font-size="8" fill="#dfe7ff">tap = selectFrame (toggle pick)</text>

    <!-- selected-frame green corner ticks (this frame IS picked) -->
    <g stroke="#5ec85e" stroke-width="2.2" fill="none">
      <path d="M80 96 h12 M80 96 v12"/>
      <path d="M320 96 h-12 M320 96 v12"/>
      <path d="M80 336 h12 M80 336 v-12"/>
      <path d="M320 336 h-12 M320 336 v-12"/>
    </g>

    <!-- labels: size in cells AND pt + centred position -->
    <text x="200" y="74" font-size="7" fill="#5a5a66" text-anchor="middle"></text>
    <rect x="76" y="92" width="120" height="13" fill="#000" opacity="0.35"/>
    <text x="80" y="101" font-size="7.5" fill="#8fb4ff">Field64  64x64 cells = 256pt</text>
    <text x="80" y="319" font-size="7.5" fill="#8fb4ff">dock col18,row22  interactive=TRUE</text>

    <!-- ================= SCRUB RAIL (rows 88-92, under Field64) =========== -->
    <!-- 64-tick rail: one tick per frame; the cursor detent (CellTick).     -->
    <!-- y = 89*4=356 .. 92*4=368 ; x spans Field64 width 72..328.           -->
    <rect x="72" y="356" width="256" height="14" rx="3" fill="#14141a" stroke="#2e2e38" stroke-width="0.5"/>
    <!-- 64 frame ticks -->
    <g stroke="#3a3a44" stroke-width="1">
      <line x1="74"  y1="358" x2="74"  y2="368"/><line x1="78"  y1="358" x2="78"  y2="368"/>
      <line x1="82"  y1="360" x2="82"  y2="366"/><line x1="86"  y1="360" x2="86"  y2="366"/>
      <line x1="90"  y1="360" x2="90"  y2="366"/><line x1="94"  y1="360" x2="94"  y2="366"/>
      <line x1="98"  y1="360" x2="98"  y2="366"/><line x1="120" y1="360" x2="120" y2="366"/>
      <line x1="160" y1="360" x2="160" y2="366"/><line x1="240" y1="360" x2="240" y2="366"/>
      <line x1="300" y1="360" x2="300" y2="366"/><line x1="324" y1="358" x2="324" y2="368"/>
    </g>
    <!-- 4 picked-frame markers on the rail (green) -->
    <g fill="#5ec85e"><rect x="100" y="357" width="3" height="12"/><rect x="170" y="357" width="3" height="12"/></g>
    <g fill="#3a5a3a"><rect x="230" y="357" width="3" height="12"/><rect x="290" y="357" width="3" height="12"/></g>
    <!-- cursor head at frame 23 -->
    <polygon points="178,355 174,348 182,348" fill="#7fd4ff"/>
    <line x1="178" y1="356" x2="178" y2="370" stroke="#7fd4ff" stroke-width="1.4"/>
    <text x="334" y="367" font-size="7" fill="#6a6a76">rail: 64 frames</text>

    <!-- ================= PICK-FOUR FILMSTRIP (the 4 chosen) ============== -->
    <!-- 4 thumbnails, each 16x16 cells = 64pt. Row band y=396..460.         -->
    <!-- Centred: total 4*64 + 3*8 gutter = 280 < 400; start x=60.           -->
    <text x="60" y="392" font-size="8" fill="#cfcfe0">PICKED FOUR  (filmstrip &#183; 4 thumbnails 16x16 = 64pt each)</text>
    <!-- thumb 1 (filled) -->
    <rect x="60"  y="398" width="64" height="64" fill="#26405e" stroke="#5ec85e" stroke-width="1.6"/>
    <text x="63" y="458" font-size="7" fill="#5ec85e">f08</text>
    <!-- thumb 2 (filled) -->
    <rect x="132" y="398" width="64" height="64" fill="#34597f" stroke="#5ec85e" stroke-width="1.6"/>
    <text x="135" y="458" font-size="7" fill="#5ec85e">f23</text>
    <!-- thumb 3 (empty slot) -->
    <rect x="204" y="398" width="64" height="64" fill="#101014" stroke="#3a3a44" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="236" y="436" font-size="20" fill="#3a3a44" text-anchor="middle">+</text>
    <!-- thumb 4 (empty slot) -->
    <rect x="276" y="398" width="64" height="64" fill="#101014" stroke="#3a3a44" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="308" y="436" font-size="20" fill="#3a3a44" text-anchor="middle">+</text>

    <!-- ================= OPEN-QUESTION CALLOUT (rows ~117-138) =========== -->
    <!-- THE big unresolved design question, surfaced prominently.           -->
    <rect x="40" y="478" width="320" height="66" rx="8" fill="#1a1410" stroke="#caa24a" stroke-width="1"/>
    <text x="52" y="496" font-size="9" fill="#e8c46a" font-weight="bold">OPEN Q  &#9888;  WHAT ARE THE FOUR / WHAT DO THEY FEED?</text>
    <text x="52" y="510" font-size="8" fill="#d8c8a0">A) keyframes (4 anchors the render interpolates between)</text>
    <text x="52" y="522" font-size="8" fill="#d8c8a0">B) a 4-frame curation (the GIF IS just these 4, looped)</text>
    <text x="52" y="534" font-size="8" fill="#d8c8a0">C) the 4^4 QUAD anchors (Spec.PairTreeFixed collapse lever)</text>

    <!-- ================= PALETTE16 (per-frame palette of cursor) ========= -->
    <!-- 16x16 cells @4pt = 64pt. dock col 42 (x=168), row 145 (y=580).      -->
    <!-- col 42 = (100-16)/2 => centred. Here it MIRRORS the cursor frame.   -->
    <rect x="168" y="580" width="64" height="64" fill="#101014" stroke="#6a6a76" stroke-width="0.8"/>
    <g opacity="0.9">
      <rect x="168" y="580" width="16" height="16" fill="#26405e"/><rect x="184" y="580" width="16" height="16" fill="#34597f"/>
      <rect x="200" y="580" width="16" height="16" fill="#c8a24a"/><rect x="216" y="580" width="16" height="16" fill="#2c4a6c"/>
      <rect x="168" y="596" width="16" height="16" fill="#1f3650"/><rect x="184" y="596" width="16" height="16" fill="#3a5a7a"/>
      <rect x="200" y="596" width="16" height="16" fill="#d8b25a"/><rect x="216" y="596" width="16" height="16" fill="#22384f"/>
      <rect x="168" y="612" width="64" height="32" fill="#1a2838" opacity="0.6"/>
    </g>
    <text x="168" y="660" font-size="7.5" fill="#9a9aa6">Palette16  16x16=64pt  @col42,row145</text>
    <text x="168" y="670" font-size="7.5" fill="#9a9aa6">draws = per-frame palette of CURSOR frame (inert here)</text>

    <!-- ================= DIVERSITY RING (repurposed: coverage gauge) ===== -->
    <!-- 20x20 cells = 80pt. dock col 40 (x=160), row 170 (y=680).          -->
    <circle cx="200" cy="720" r="40" fill="none" stroke="#23232c" stroke-width="6"/>
    <!-- 64 ticks; filled arc = gamut coverage of the 4 picks so far -->
    <path d="M200 680 A40 40 0 1 1 168 736" fill="none" stroke="#5ec85e" stroke-width="6" stroke-linecap="round"/>
    <text x="200" y="716" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">71%</text>
    <text x="200" y="728" font-size="7" fill="#9aa" text-anchor="middle">gamut cov</text>
    <text x="200" y="772" font-size="7" fill="#6a6a76" text-anchor="middle">DiversityRing 20x20=80pt @col40,row170</text>
    <text x="200" y="782" font-size="7" fill="#6a6a76" text-anchor="middle">data: Spec.Coverage gamutCoverageFraction(picks)</text>

    <!-- ================= CONTINUE GATE (bottom, gated on picked==4) ====== -->
    <!-- Disabled until 4 picked. Fires picked4 event => .rendering(quantize)-->
    <rect x="56" y="800" width="288" height="44" rx="10" fill="#16241a" stroke="#2f4a32" stroke-width="1"/>
    <text x="200" y="827" font-size="11" fill="#5a6a5c" text-anchor="middle" font-weight="bold">CONTINUE &#8594; RENDER   (locked: pick 4)</text>
    <text x="200" y="794" font-size="7" fill="#6a6a76" text-anchor="middle">gate: enabled iff picked==4  &#183;  tap = picked4 event</text>

    <!-- screen border -->
    <rect x="0.6" y="0.6" width="398.8" height="870.8" rx="55.4" ry="55.4" fill="none" stroke="#3a3a44" stroke-width="1.2"/>
  </g>
</svg>
