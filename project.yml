name: SixFour
options:
  bundleIdPrefix: com.sixfour
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: false
  groupSortPosition: top
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.2"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SWIFT_STRICT_CONCURRENCY: complete
    # Do NOT set GENERATE_INFOPLIST_FILE: YES — we ship an explicit
    # SixFour/Info.plist via `info.path`. Enabling the generator makes
    # Xcode synthesize a partial plist that drops CFBundleIdentifier,
    # which then breaks `simctl install` ("Missing bundle ID").
    CODE_SIGN_STYLE: Automatic
    # Device (iphoneos) builds sign for real with the personal team's
    # Apple Development identity; the ad-hoc "-" identity is a
    # SIMULATOR-ONLY hack (a device rejects ad-hoc-signed apps), so both
    # it and the signing-not-required escape are scoped to the sim SDK.
    DEVELOPMENT_TEAM: 9WANULVN2G
    "CODE_SIGN_IDENTITY[sdk=iphonesimulator*]": "-"
    "CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]": NO
    # Xcode 26's Metal toolchain emits `default.metallib` with embedded
    # source records (-frecord-sources); codesign treats it as a nested
    # code object and the simulator's ad-hoc bundle sign won't recurse
    # without --deep, failing with "code object is not signed at all".
    OTHER_CODE_SIGN_FLAGS: "--deep"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # Opt into the modern CBLAS interface so ClusterStatisticsOps' cblas_dgemm /
    # cblas_dgemv calls don't emit macOS 13.3 deprecation warnings.
    GCC_PREPROCESSOR_DEFINITIONS: "$(inherited) ACCELERATE_NEW_LAPACK=1"
    # The owned native Zig lib (Native/lib/) is arm64-only by design, so the iOS
    # Simulator must build arm64-only too. Without this, a generic simulator
    # destination (or a Release / archive build) also requests the x86_64 slice and
    # fails at link ("ignoring file ... found arm64, required x86_64; Undefined
    # symbols for architecture x86_64"). Apple-Silicon simulators run arm64
    # natively, so excluding x86_64 loses nothing. Device (iphoneos) is unaffected.
    "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: -Onone
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O

targets:
  SixFour:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    preBuildScripts:
      - name: spec-codegen drift gate
        script: |
          # Regenerate the Swift + Python bridges into a scratch dir and
          # diff against the committed files. Fails the build if the
          # committed contracts have drifted from the Haskell spec.
          #
          # Xcode's iOS-simulator build environment exports SDKROOT /
          # ARCHS / etc. that confuse the host-targeted GHC toolchain,
          # so cabal is invoked through `env -i` to start clean.
          SRC="$SRCROOT"
          CABAL=""
          for candidate in "$HOME/.ghcup/bin/cabal" "/opt/homebrew/bin/cabal" "/usr/local/bin/cabal"; do
            if [ -x "$candidate" ]; then CABAL="$candidate"; break; fi
          done
          if [ -z "$CABAL" ]; then
            echo "warning: cabal not found; skipping spec-codegen drift gate"
            exit 0
          fi
          set -e
          SCRATCH="$(mktemp -d)"
          trap 'rm -rf "$SCRATCH"' EXIT
          env -i HOME="$HOME" PATH="$HOME/.ghcup/bin:/opt/homebrew/bin:/usr/bin:/bin" \
            sh -c "cd '$SRC/spec' && '$CABAL' run -v0 spec-codegen -- \
              --swift-out '$SCRATCH/swift' --mlx-out '$SCRATCH/mlx' --res-out '$SCRATCH/res'"
          FAIL=0
          # Gate EVERY emitted Swift contract against its committed copy. Looping
          # over the generated set — rather than a hand-maintained file list —
          # means a NEW contract is covered automatically and cannot silently
          # escape the gate (the blind-list bug the harden pass found). The
          # per-build BuildStamp.swift is written by a separate phase, not
          # spec-codegen, so it is correctly absent here and not checked.
          for gen in "$SCRATCH"/swift/*.swift; do
            name="$(basename "$gen")"
            if ! diff -q "$gen" "$SRC/SixFour/Generated/$name" >/dev/null 2>&1; then
              echo "error: SixFour/Generated/$name drifted from the spec (or is uncommitted)."
              diff -u "$SRC/SixFour/Generated/$name" "$gen" 2>/dev/null || true
              FAIL=1
            fi
          done
          # The non-Swift bridges the gate has always covered.
          for pair in \
            "mlx/stages.py:trainer/generated/stages.py" \
            "res/stbn3d-8.bin:SixFour/Resources/stbn3d-8.bin"; do
            gen="$SCRATCH/${pair%%:*}"; dst="$SRC/${pair##*:}"
            if ! diff -q "$gen" "$dst" >/dev/null 2>&1; then
              echo "error: ${pair##*:} drifted from the spec."
              diff -u "$dst" "$gen" 2>/dev/null || true
              FAIL=1
            fi
          done
          if [ "$FAIL" != 0 ]; then
            echo "Run 'cd spec && cabal run spec-codegen' and commit the result."
            exit 1
          fi
        basedOnDependencyAnalysis: false
      - name: GRID design-language lint
        script: |
          # Enforce the capture-HUD GRID invariants (docs/SIXFOUR-DESIGN-LANGUAGE.md):
          # no glass / opacity-on-a-cell / raw vector primitives on the HUD
          # (LINT-DRAW-VOCAB), no bare point literal bypassing GlobalLattice.pt()
          # (LINT-SINGLE-PITCH), and the Spec.* goldens + contracts exist (LINT-GOLDEN).
          # Fails the build on drift so Phases 1–3a cannot silently regress.
          "$SRCROOT/scripts/lint-grid.sh"
        basedOnDependencyAnalysis: false
      - name: build stamp (git SHA + time, on-screen)
        script: |
          # Regenerate BuildStamp.swift EVERY build so the running binary shows its
          # exact git SHA + build time on screen. Makes "no change after pulling"
          # objectively decidable: if the on-glass SHA != HEAD, the device is on a
          # STALE build (most often: `xcodegen generate` was skipped after a pull —
          # SixFour gitignores project.pbxproj). Sandboxing is OFF (see settings).
          SHA=$(git -C "$SRCROOT" rev-parse --short HEAD 2>/dev/null || echo nogit)
          git -C "$SRCROOT" diff --quiet 2>/dev/null || SHA="$SHA+"
          TS=$(date -u +%Y-%m-%dT%H:%M)
          OUT="$SRCROOT/SixFour/Generated/BuildStamp.swift"
          printf 'enum BuildStamp {\n    static let gitSHA = "%s"\n    static let buildTime = "%s"\n}\n' "$SHA" "$TS" > "$OUT"
        basedOnDependencyAnalysis: false
    sources:
      # `path: SixFour, type: group` recursively picks up everything in
      # SixFour/, including SixFour/Resources/stbn3d-8.bin (auto-added as
      # a bundle-root resource). We intentionally do NOT add Resources/
      # as a separate folder reference: doing so creates a literal
      # `SixFour.app/Resources/` subdirectory, which simctl misreads as
      # a nested bundle and rejects the install with "Missing bundle ID".
      - path: SixFour
        type: group
        excludes:
          # LUT .bin GOLDENS (source-of-truth for the generated KernelsLUTData.swift
          # base64 embeds; ZigPortColorTests reads them #filePath-relative). NOT app
          # resources — gamma_lut.bin would collide with SixFour/Resources/gamma_lut.bin
          # at the bundle root ("Multiple commands produce").
          - Kernels/LUTGoldens
          # PERF-MAP §3.5 Batch 0 (2026-07-08): dead weight OUT of the app binary,
          # files KEPT on disk (goldens/codegen intact; reversible by deleting a
          # line). Every entry mechanically verified ZERO-REFERENCE across BOTH
          # SixFour/ and SixFourTests/ (type + top-level declarations) — the test
          # bundle is TEST_HOST-hosted, so an app-target exclude removes the symbol
          # from @testable import too; anything a test references stays IN.
          - Generated/DerivationLogGolden.swift
          - Generated/Ed25519Golden.swift
          - Generated/GeneHashGolden.swift
          - Generated/Sha512Golden.swift
          - Generated/SigChainGolden.swift
          - Capture/FrameBuffer.swift
          - Encoder/NetSynth256.swift
          - UI/Components/CellGlyph.swift
    # Game Center + CloudKit entitlements — DISABLED 2026-07-02 for on-device
    # testing. The swap-economy code that needs them (GeneLibrary/: CreatorIdentity
    # GKLocalPlayer auth, GeneExchange CKContainer.default()) is dormant — nothing
    # outside GeneLibrary/ instantiates it, so no runtime path can crash on the
    # missing entitlements. With them declared, a device build demands an explicit
    # App ID profile with Game Center + iCloud, which the portal refuses to mint
    # until the pending Program License Agreement is accepted (and iCloud may need
    # a paid membership); without them the cached wildcard team profile
    # (9WANULVN2G.*) signs the device build offline. RESTORE this block (and
    # re-run `xcodegen generate`) when the S4GX swap-economy port goes live:
    #
    # entitlements:
    #   path: SixFour/SixFour.entitlements
    #   properties:
    #     com.apple.developer.game-center: true
    #     com.apple.developer.icloud-services:
    #       - CloudKit
    #     com.apple.developer.icloud-container-identifiers:
    #       - iCloud.com.sixfour.SixFour
    info:
      path: SixFour/Info.plist
      properties:
        CFBundleDisplayName: SixFour
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
        # Launch screen: an EMPTY UILaunchScreen dict opts into the modern
        # system launch screen (full-screen, no storyboard file needed). The
        # background is the system background, which UIUserInterfaceStyle=Dark
        # forces BLACK — matching the app's forced-dark surface, so there is no
        # white flash on launch. Do NOT add UILaunchStoryboardName: it names a
        # storyboard that is not in the bundle (there is no .storyboard here;
        # the only .xcassets is the AppIcon catalog, added 2026-07-03), so the
        # system tries to instantiate an empty-named storyboard during launch —
        # a crash inside UIKit BEFORE the app's own code runs.
        UILaunchScreen: {}
        UIUserInterfaceStyle: Dark
        # Scene manifest: SwiftUI's App/WindowGroup lifecycle is scene-based and
        # normally synthesizes this, but the iOS 27 SDK asserts at launch when an
        # app has no scene declaration. Declare the minimal single-scene manifest
        # explicitly (no scene-delegate class — SwiftUI provides it) so the app is
        # unambiguously scene-conformant on iOS 27. UISceneMinimumRoleParticipation
        # off keeps it single-window. Removes one iOS-27 launch unknown.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Total-pixelation: the iOS system status bar is system-font/AA chrome we can't
        # cellularize, so hide it app-wide. The plist keys are belt-and-suspenders for
        # the SwiftUI `.statusBarHidden()` modifier — they kill the first-frame flash on
        # launch (before SwiftUI applies the modifier). See docs/SIXFOUR-TOTAL-PIXELATION.md.
        UIStatusBarHidden: true
        UIViewControllerBasedStatusBarAppearance: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        NSCameraUsageDescription: >-
          SixFour captures 64 frames at 20 fps to build a 64×64 animated GIF
          with a global 256-color Lab palette shaped by your signature look.
        NSPhotoLibraryAddUsageDescription: >-
          SixFour saves your generated GIFs to the Photos library.
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sixfour.SixFour
        # App icon (ship blocker, 2026-07-03): SixFour/Assets.xcassets carries a
        # single-size 1024 AppIcon (pixel-art "64", the a/b/L channel tints —
        # a programmatic candidate; replace the PNG to rebrand, the name stays).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Apple Development team (Daniel Mosquera) — REQUIRED to sign for a real iPhone.
        # Kept here (not just in Xcode) so `xcodegen generate` can't wipe it on regen.
        # 9WANULVN2G is the personal team this machine is provisioned for (the valid
        # "iOS Team Provisioning Profile" on disk, TeamName Daniel Mosquera). The old
        # QFTX3897B7 had no signed-in account here ("No Account for Team QFTX3897B7").
        DEVELOPMENT_TEAM: 9WANULVN2G
        # The owned byte-exact kernel core is pure Swift (SixFour/Kernels/,
        # ported from the Zig Native/ core 2026-07-06; same s4_* names via
        # @_cdecl, golden-gated). The bridging header now carries only the
        # ObjC exception shim.
        SWIFT_OBJC_BRIDGING_HEADER: $(SRCROOT)/SixFour/Native/SixFour-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/SixFour/Native    # SFObjC.h (ObjC exception shim) for the bridging header

  SixFourTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: SixFourTests
        type: group
        optional: true
    dependencies:
      - target: SixFour
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sixfour.SixFourTests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/SixFour.app/SixFour
        SWIFT_VERSION: "6.2"
        SWIFT_STRICT_CONCURRENCY: minimal
        # Test target has no explicit Info.plist; let Xcode synthesize one.
        # (The main SixFour target ships its own SixFour/Info.plist, which
        # is why GENERATE_INFOPLIST_FILE is intentionally OFF in the base
        # settings — turning it on at base strips CFBundleIdentifier from
        # the app bundle.)
        GENERATE_INFOPLIST_FILE: YES

schemes:
  SixFour:
    build:
      targets:
        SixFour: all
        SixFourTests: [test]
    test:
      targets:
        - SixFourTests
      gatherCoverageData: false
