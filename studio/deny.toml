# License-compliance gate for a PROPRIETARY, for-profit product.
# Rule: `cargo deny check licenses` must pass before any dependency is added.
# Only permissive / commercial-safe licenses are allowed; GPL/AGPL/SSPL/CC-BY-NC
# (anything not listed) is rejected.

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
    "MPL-2.0",            # file-level copyleft: OK (we don't modify those files)
    "CDLA-Permissive-2.0",
    "OFL-1.1",            # fonts (rerun viewer only) — bundling OK
    "Ubuntu-font-1.0",
    "MIT-0",
    "0BSD",
    "Unlicense",
]
# Workspace crates are publish=false / LicenseRef-Proprietary — skip them.
private = { ignore = true }

# Crates whose license crates.io stores as a FILE rather than an SPDX field.
# (Hashes filled in from the first `cargo deny` run if it can't auto-detect.)
[[licenses.clarify]]
crate = "sublime_fuzzy"
expression = "MIT"
license-files = []

[bans]
multiple-versions = "allow"

[advisories]
version = 2
