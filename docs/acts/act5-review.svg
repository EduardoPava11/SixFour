<svg xmlns="http://www.w3.org/2000/svg" width="400" height="872" viewBox="0 0 400 872" font-family="ui-monospace, Menlo, monospace">
  <!-- ===================================================================== -->
  <!-- ACT V — REVIEW. SixFour one-surface mockup.                            -->
  <!-- Canvas = 400x872 pt (1 unit = 1 pt). Atom gifPx = 4 pt.                -->
  <!-- Lattice: cols 100 (=400pt), rows 218 (=872pt). Rounded screen rx~56.   -->
  <!-- The committed GIFA loops on the 20fps clock; cells fill with palette   -->
  <!-- tools (collapse lever, GIFC rung) + coverage/diversity readouts.       -->
  <!-- NO screen swap: every region is a cell update on the ONE field.        -->
  <!-- ===================================================================== -->

  <defs>
    <clipPath id="screen"><rect x="0" y="0" width="400" height="872" rx="56" ry="56"/></clipPath>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#6f8fd6"/>
      <stop offset="0.4" stop-color="#d8a35a"/>
      <stop offset="0.75" stop-color="#7ec48a"/>
      <stop offset="1"   stop-color="#b85f7a"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#screen)">
    <!-- ground: the live cell field shows through (review is no exception) -->
    <rect x="0" y="0" width="400" height="872" fill="#0b0c10"/>

    <!-- faint 4pt cell grid -->
    <g stroke="#1c1f27" stroke-width="0.5">
      <!-- verticals every 4pt (cols) -->
      <g>
        <line x1="0"  y1="0" x2="0"  y2="872"/><line x1="40" y1="0" x2="40" y2="872"/>
        <line x1="80" y1="0" x2="80" y2="872"/><line x1="120" y1="0" x2="120" y2="872"/>
        <line x1="160" y1="0" x2="160" y2="872"/><line x1="200" y1="0" x2="200" y2="872"/>
        <line x1="240" y1="0" x2="240" y2="872"/><line x1="280" y1="0" x2="280" y2="872"/>
        <line x1="320" y1="0" x2="320" y2="872"/><line x1="360" y1="0" x2="360" y2="872"/>
        <line x1="400" y1="0" x2="400" y2="872"/>
      </g>
      <!-- horizontals every 40pt for legibility (true grid is 4pt) -->
      <g>
        <line x1="0" y1="0"   x2="400" y2="0"/><line x1="0" y1="80"  x2="400" y2="80"/>
        <line x1="0" y1="160" x2="400" y2="160"/><line x1="0" y1="240" x2="400" y2="240"/>
        <line x1="0" y1="320" x2="400" y2="320"/><line x1="0" y1="400" x2="400" y2="400"/>
        <line x1="0" y1="480" x2="400" y2="480"/><line x1="0" y1="560" x2="400" y2="560"/>
        <line x1="0" y1="640" x2="400" y2="640"/><line x1="0" y1="720" x2="400" y2="720"/>
        <line x1="0" y1="800" x2="400" y2="800"/>
      </g>
    </g>

    <!-- ================= rows 0-21 : TITLE / METADATA BAND ================= -->
    <!-- DATA-CANVAS A: GIF identity line + cube-ladder rung badges.          -->
    <!-- cols 8..92, rows 4..18 (x32..368, y16..72)                          -->
    <text x="200" y="34" fill="#9aa3b2" font-size="11" text-anchor="middle" letter-spacing="2">SIXFOUR · GIFA · 64³</text>
    <text x="200" y="50" fill="#46c85a" font-size="9"  text-anchor="middle">deterministic core · byte-reproducible</text>
    <!-- cube-ladder rung badges {16,64,256} : the resolution funnel, top-right -->
    <g font-size="8" text-anchor="middle">
      <rect x="248" y="58" width="32" height="14" rx="3" fill="#15171d" stroke="#2a2e38"/>
      <text x="264" y="68" fill="#6f7686">16³</text>
      <rect x="284" y="58" width="32" height="14" rx="3" fill="#1d2733" stroke="#3a5a86"/>
      <text x="300" y="68" fill="#9ec3f0">64³</text>
      <rect x="320" y="58" width="32" height="14" rx="3" fill="#15171d" stroke="#2a2e38"/>
      <text x="336" y="68" fill="#6f7686">256³</text>
    </g>

    <!-- ================= FIELD64 — the GIFA hero ================= -->
    <!-- 64x64 cells = 256x256 pt. dock col 18,row 22 => x72..328, y88..344  -->
    <rect x="72" y="88" width="256" height="256" fill="url(#hero)" opacity="0.92"/>
    <rect x="72" y="88" width="256" height="256" fill="none" stroke="#3a4150" stroke-width="1"/>
    <!-- frame cursor read-out (κ Z64) bottom-left of hero -->
    <rect x="76" y="320" width="56" height="18" rx="3" fill="#0c0e13" opacity="0.7"/>
    <text x="104" y="333" fill="#cdd4e0" font-size="9" text-anchor="middle">t 37/64</text>
    <text x="200" y="360" fill="#5a6273" font-size="9" text-anchor="middle">FIELD64 · 64×64 cells · 256×256 pt · loops @20fps (gifCell over palettesPerFrame)</text>

    <!-- ============ rows 86-100 : COVERAGE / DIVERSITY READOUT ROW ============ -->
    <!-- DATA-CANVAS B: per-frame palette-quality bars (Spec.Coverage/Diversity) -->
    <!-- cols 6..94, rows 92..104 (x24..376, y368..416)                          -->
    <text x="28" y="384" fill="#6f7686" font-size="8">COVERAGE</text>
    <rect x="84"  y="377" width="180" height="8" rx="2" fill="#15171d" stroke="#2a2e38"/>
    <rect x="84"  y="377" width="138" height="8" rx="2" fill="#46c85a"/>
    <text x="276" y="384" fill="#9aa3b2" font-size="8">0.76</text>

    <text x="28" y="402" fill="#6f7686" font-size="8">EFF·DIM</text>
    <rect x="84"  y="395" width="180" height="8" rx="2" fill="#15171d" stroke="#2a2e38"/>
    <rect x="84"  y="395" width="156" height="8" rx="2" fill="#d8a35a"/>
    <text x="276" y="402" fill="#9aa3b2" font-size="8">2.6 / 3</text>

    <!-- =========== rows 100-138 : COLLAPSE LEVER — the radix grid =========== -->
    <!-- DATA-CANVAS C: 16²/4⁴/2⁸ tree view; cells fuse at the cut level.       -->
    <!-- 16x16 cells = 64x64 pt, centred col 42 => x168..232, y416..480         -->
    <text x="200" y="430" fill="#7a8294" font-size="9" text-anchor="middle">COLLAPSE LEVER — palette tree (cells fuse above the cut)</text>
    <!-- the radix grid drawn as fused 8x8 super-cells (cut shown) -->
    <g>
      <rect x="168" y="436" width="64" height="64" fill="none" stroke="#3a4150"/>
      <!-- 4x4 fused super-cells = collapse shown -->
      <g shape-rendering="crispEdges">
        <rect x="168" y="436" width="16" height="16" fill="#6f8fd6"/><rect x="184" y="436" width="16" height="16" fill="#5d7fc8"/>
        <rect x="200" y="436" width="16" height="16" fill="#d8a35a"/><rect x="216" y="436" width="16" height="16" fill="#c4924b"/>
        <rect x="168" y="452" width="16" height="16" fill="#7e9bdc"/><rect x="184" y="452" width="16" height="16" fill="#8aa6e2"/>
        <rect x="200" y="452" width="16" height="16" fill="#e0b06a"/><rect x="216" y="452" width="16" height="16" fill="#d8a35a"/>
        <rect x="168" y="468" width="16" height="16" fill="#7ec48a"/><rect x="184" y="468" width="16" height="16" fill="#6fb87c"/>
        <rect x="200" y="468" width="16" height="16" fill="#b85f7a"/><rect x="216" y="468" width="16" height="16" fill="#a8546e"/>
        <rect x="168" y="484" width="16" height="16" fill="#8ccf97"/><rect x="184" y="484" width="16" height="16" fill="#7ec48a"/>
        <rect x="200" y="484" width="16" height="16" fill="#c46c86"/><rect x="216" y="484" width="16" height="16" fill="#b85f7a"/>
      </g>
    </g>
    <!-- tree selector: 16² / 4⁴ / 2⁸ (3-way CellSelector) to the LEFT -->
    <g font-size="8" text-anchor="middle">
      <rect x="36" y="436" width="40" height="18" rx="3" fill="#1d2733" stroke="#3a5a86"/><text x="56" y="448" fill="#9ec3f0">16²</text>
      <rect x="36" y="458" width="40" height="18" rx="3" fill="#15171d" stroke="#2a2e38"/><text x="56" y="470" fill="#6f7686">4⁴</text>
      <rect x="36" y="480" width="40" height="18" rx="3" fill="#15171d" stroke="#2a2e38"/><text x="56" y="492" fill="#6f7686">2⁸</text>
    </g>
    <!-- scope toggle per-frame|global to the RIGHT -->
    <g font-size="7" text-anchor="middle">
      <rect x="252" y="436" width="44" height="18" rx="3" fill="#15171d" stroke="#2a2e38"/><text x="274" y="448" fill="#6f7686">per-frm</text>
      <rect x="252" y="458" width="44" height="18" rx="3" fill="#1d2733" stroke="#3a5a86"/><text x="274" y="470" fill="#9ec3f0">global</text>
    </g>

    <!-- =========== rows 130-138 : CUT-LEVEL SLIDER (cell-rendered) =========== -->
    <!-- DATA-CANVAS D: 0..depth cut; the motion-bandwidth knob.                -->
    <!-- cols 8..92, rows 130..136 (x32..368, y520..544)                        -->
    <text x="32" y="528" fill="#6f7686" font-size="8">CUT</text>
    <rect x="64" y="522" width="272" height="8" rx="4" fill="#15171d" stroke="#2a2e38"/>
    <rect x="64" y="522" width="170" height="8" rx="4" fill="#3a5a86"/>
    <!-- discrete detents 0..8 -->
    <g fill="#2a2e38"><circle cx="64" cy="526" r="2"/><circle cx="98" cy="526" r="2"/><circle cx="132" cy="526" r="2"/><circle cx="166" cy="526" r="2"/><circle cx="200" cy="526" r="2"/><circle cx="234" cy="526" r="2"/><circle cx="268" cy="526" r="2"/><circle cx="302" cy="526" r="2"/><circle cx="336" cy="526" r="2"/></g>
    <circle cx="234" cy="526" r="6" fill="#9ec3f0" stroke="#0b0c10" stroke-width="1.5"/>
    <text x="350" y="528" fill="#9aa3b2" font-size="8">5/8</text>

    <!-- ================= PALETTE16 — per-frame palette ================= -->
    <!-- 16x16 cells = 64x64 pt. dock col 42,row 145 => x168..232, y580..644 -->
    <g shape-rendering="crispEdges">
      <rect x="168" y="580" width="64" height="64" fill="#101218"/>
      <!-- a sampling of palette swatches (16x16 = 256 colours, cursor frame) -->
      <rect x="168" y="580" width="16" height="16" fill="#6f8fd6"/><rect x="184" y="580" width="16" height="16" fill="#d8a35a"/>
      <rect x="200" y="580" width="16" height="16" fill="#7ec48a"/><rect x="216" y="580" width="16" height="16" fill="#b85f7a"/>
      <rect x="168" y="596" width="16" height="16" fill="#8aa6e2"/><rect x="184" y="596" width="16" height="16" fill="#e0b06a"/>
      <rect x="200" y="596" width="16" height="16" fill="#8ccf97"/><rect x="216" y="596" width="16" height="16" fill="#c46c86"/>
      <rect x="168" y="612" width="16" height="16" fill="#5d7fc8"/><rect x="184" y="612" width="16" height="16" fill="#c4924b"/>
      <rect x="200" y="612" width="16" height="16" fill="#6fb87c"/><rect x="216" y="612" width="16" height="16" fill="#a8546e"/>
      <rect x="168" y="628" width="16" height="16" fill="#9bb2e8"/><rect x="184" y="628" width="16" height="16" fill="#eab974"/>
      <rect x="200" y="628" width="16" height="16" fill="#9ad6a3"/><rect x="216" y="628" width="16" height="16" fill="#d07c92"/>
    </g>
    <rect x="168" y="580" width="64" height="64" fill="none" stroke="#3a4150"/>
    <text x="200" y="660" fill="#5a6273" font-size="9" text-anchor="middle">PALETTE16 · 16×16 · 64×64 pt · cursor-frame palette (inert in review)</text>

    <!-- ================= DIVERSITYRING — gauge ================= -->
    <!-- 20x20 cells = 80x80 pt. dock col 40,row 170 => x160..240, y680..760  -->
    <!-- DATA-CANVAS E: 64-tick diversity arc, one tick per frame.            -->
    <g>
      <!-- 64 radial ticks (drawn as a dashed ring) -->
      <circle cx="200" cy="720" r="34" fill="none" stroke="#2a2e38" stroke-width="6"
              stroke-dasharray="1.5 1.84"/>
      <!-- filled arc = current diversity (≈76%) -->
      <circle cx="200" cy="720" r="34" fill="none" stroke="#46c85a" stroke-width="6"
              stroke-dasharray="162 214" transform="rotate(-90 200 720)"/>
      <text x="200" y="717" fill="#cdd4e0" font-size="11" text-anchor="middle">0.76</text>
      <text x="200" y="730" fill="#6f7686" font-size="7"  text-anchor="middle">DIVERSITY</text>
    </g>
    <text x="200" y="772" fill="#5a6273" font-size="9" text-anchor="middle">DIVERSITYRING · 20×20 · 80×80 pt · 64 ticks (one per frame)</text>

    <!-- ================= rows 195-210 : ACTION ROW ================= -->
    <!-- DATA-CANVAS F: Apply / Share / Export — the three rungs ship here.    -->
    <!-- cols 6..94, rows 198..210 (x24..376, y792..840). Each btn >=44pt tall -->
    <g font-size="10" text-anchor="middle">
      <rect x="24"  y="792" width="108" height="48" rx="10" fill="#1d2733" stroke="#3a5a86"/>
      <text x="78"  y="820" fill="#9ec3f0">Apply 64³</text>
      <rect x="146" y="792" width="108" height="48" rx="10" fill="#15171d" stroke="#2a2e38"/>
      <text x="200" y="820" fill="#cdd4e0">Share</text>
      <rect x="268" y="792" width="108" height="48" rx="10" fill="#15171d" stroke="#2a2e38"/>
      <text x="322" y="820" fill="#cdd4e0">Export 256³</text>
    </g>
    <!-- Retake : a small immovable chrome pill, top-left corner of action band -->
    <text x="200" y="858" fill="#5a6273" font-size="8" text-anchor="middle">swipe-down on hero → retake (.retake → .live)   ·   long-press any ColorWidget → move</text>

    <!-- rounded screen frame -->
    <rect x="0.5" y="0.5" width="399" height="871" rx="56" ry="56" fill="none" stroke="#2f3540" stroke-width="1"/>
  </g>
</svg>
