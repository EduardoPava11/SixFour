name: gate (grid lint)

# The GRID design-language lint is dependency-free (grep/test over committed
# SixFour/UI + Generated/ + Spec sources) and safe on a clean checkout, so it
# runs on every push/PR. It runs on macos-14 to match the dev platform (the
# script was authored against BSD grep/find on darwin).
#
# The other s4 gates are NOT checkout-safe and stay local-only via scripts/s4.sh:
#   doc     — verify-doc-claims.sh asserts local generated/trained artifacts
#             (e.g. trainer/out/look_net_trained.s4ln, which is gitignored), so a
#             clean CI checkout would fail it; it is wired into `s4 all` locally.
#   native  — zig build test needs a Python-produced fixture under trainer/out/.
#   build   — xcodebuild needs Xcode 26.2 / iOS 26, absent on hosted runners.

on:
  push:
    branches: [master]
  pull_request:

jobs:
  grid-lint:
    name: GRID design-language lint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Lint GRID placement / single-pitch invariants
        run: bash scripts/lint-grid.sh
