<?xml version="1.0" encoding="UTF-8"?>
<!-- SixFour — ACT I: OPEN / LIVE  (SurfacePhase = .live)
     Canvas 400x872 pt = the iPhone 17 Pro screen at 1pt = 1 unit (safe-area logical).
     Lattice v3.0: atom gifPx = 4pt, 100 cols x 218 rows. ONE-SURFACE LAW: this is a
     CELL-GRID CONFIGURATION of the single persistent field, never a separate view.
     All widget positions are absolute cell rects; rows/cols labelled in cells AND pt. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="872" viewBox="0 0 400 872"
     font-family="ui-monospace, Menlo, monospace">

  <defs>
    <!-- faint 4pt cell grid -->
    <pattern id="cell" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M4 0H0V4" fill="none" stroke="#1d1d24" stroke-width="0.25"/>
    </pattern>
    <!-- coarse 16-cell (64pt) major lines -->
    <pattern id="major" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#2c2c38" stroke-width="0.5"/>
    </pattern>
    <!-- the heartbeat checker ground (palette-tinted, 20fps invert) — sample swatch -->
    <pattern id="checker" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#0e0e14"/>
      <rect width="4" height="4" fill="#17171f"/>
      <rect x="4" y="4" width="4" height="4" fill="#17171f"/>
    </pattern>
  </defs>

  <!-- ===== SCREEN: rounded-corner device, the ONE surface ===== -->
  <rect x="0" y="0" width="400" height="872" rx="56" ry="56" fill="#08080c"/>
  <!-- the living checker ground (TintedCheckerField) fills the whole surface -->
  <rect x="0" y="0" width="400" height="872" rx="56" ry="56" fill="url(#checker)" opacity="0.6"/>
  <rect x="0" y="0" width="400" height="872" rx="56" ry="56" fill="url(#cell)"/>
  <rect x="0" y="0" width="400" height="872" rx="56" ry="56" fill="url(#major)"/>
  <rect x="0" y="0" width="400" height="872" rx="56" ry="56" fill="none" stroke="#34343f" stroke-width="1"/>

  <!-- safe-area guides (top 62pt = 15.5 cells, bottom 34pt = 8.5 cells) -->
  <line x1="0" y1="62" x2="400" y2="62" stroke="#3a3a6a" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="0" y1="840" x2="400" y2="840" stroke="#3a3a6a" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="6" y="58" fill="#6a6a8a" font-size="7">safe top 62pt (row 15.5)</text>
  <text x="6" y="852" fill="#6a6a8a" font-size="7">home indicator — safe bottom 34pt (row 209.5)</text>

  <!-- Dynamic Island stand-in -->
  <rect x="138" y="14" width="124" height="34" rx="17" fill="#000000"/>

  <!-- ===== BUILD STAMP (cells, top-left, below the island) — existing ===== -->
  <text x="12" y="78" fill="#78788a" font-size="8">a1b2c3d  06-08 14:22  (CellText rows 7, leading 12pt / top 72pt)</text>

  <!-- =======================================================================
       FIELD64 — the 64x64 live preview hero  (ColorIdentity.field64)
       cells: col 18 .. 82, row 30 .. 94   (PROPOSED: row 30, was 22)
       size : 64x64 cells = 256x256 pt   |   centred col = (100-64)/2 = 18
       draws: surface.previewTile through previewPalette (1 GIF px / cell), no AA
       interactive=false (today). Camera ~10fps cadence drives liveness.
     ======================================================================= -->
  <g>
    <!-- the indexed preview tile (sketched as a soft camera-through-cells gradient) -->
    <rect x="72" y="120" width="256" height="256" fill="#14202c"/>
    <!-- a few representative quantized cells to read as "live camera through cells" -->
    <rect x="72"  y="120" width="64" height="96"  fill="#1d3a4f"/>
    <rect x="200" y="120" width="128" height="80" fill="#3a5066"/>
    <rect x="72"  y="264" width="160" height="112" fill="#243140"/>
    <rect x="232" y="232" width="96"  height="144" fill="#4a637a"/>
    <rect x="120" y="176" width="72"  height="64"  fill="#5d7d94"/>
    <!-- the 64-cell hero overlay grid to show it is cell-quantized -->
    <rect x="72" y="120" width="256" height="256" fill="url(#cell)" opacity="0.5"/>
    <rect x="72" y="120" width="256" height="256" fill="none" stroke="#5aa0c8" stroke-width="1.25"/>
    <!-- labels -->
    <text x="200" y="112" fill="#9fd0e8" font-size="9" text-anchor="middle">FIELD64 — live preview hero</text>
    <text x="200" y="392" fill="#7fb0c8" font-size="8" text-anchor="middle">64x64 cells = 256x256 pt  |  col 18, row 30  |  interactive=false</text>
  </g>

  <!-- =======================================================================
       DATA HEADROOM A — frame-budget / coverage strip (rows 96..108)
       The gap below the hero. Fills with the 64-frame readiness ribbon.
       64 cells wide x ~10 tall, col 18.  DATA: Spec.Coverage / Spec.Diversity.
     ======================================================================= -->
  <g>
    <rect x="72" y="384" width="256" height="40" fill="#0d141a" stroke="#22323e" stroke-width="0.5"/>
    <!-- 64 thin ticks = the 64 frames the burst will hold (live FPS heartbeat) -->
    <g fill="#3f6378">
      <rect x="74" y="396" width="2" height="16"/><rect x="78" y="396" width="2" height="16"/>
      <rect x="82" y="396" width="2" height="16"/><rect x="90" y="396" width="2" height="16"/>
      <rect x="98" y="396" width="2" height="16"/><rect x="110" y="396" width="2" height="16"/>
      <rect x="130" y="396" width="2" height="16"/><rect x="160" y="396" width="2" height="16"/>
      <rect x="200" y="396" width="2" height="16"/><rect x="250" y="396" width="2" height="16"/>
      <rect x="300" y="396" width="2" height="16"/><rect x="320" y="396" width="2" height="16"/>
    </g>
    <text x="200" y="418" fill="#5a7a8a" font-size="7" text-anchor="middle">64-frame ribbon — live coverage / fps heartbeat (Spec.Coverage)  col 18, rows 96-105</text>
  </g>

  <!-- =======================================================================
       DIVERSITYRING — live colour-variety gauge  (ColorIdentity.diversityRing)
       cells: col 40 .. 60, row 110 .. 130  (PROPOSED move up into the gap)
       size : 20x20 cells = 80x80 pt  |  64 radial ticks (one per frame)
       draws: effectiveDim / gaussianColorEntropy of the LIVE palette (Spec.Diversity)
       interactive=false.  (Renders NOTHING today — this act gives it data.)
     ======================================================================= -->
  <g>
    <circle cx="200" cy="480" r="40" fill="none" stroke="#22323e" stroke-width="1"/>
    <!-- 64 radial ticks, ~12 sampled; lit ticks = current diversity fill -->
    <g stroke="#4f7a90" stroke-width="1.5">
      <line x1="200" y1="444" x2="200" y2="450"/>
      <line x1="228" y1="452" x2="224" y2="456"/>
      <line x1="240" y1="480" x2="234" y2="480"/>
      <line x1="228" y1="508" x2="224" y2="504"/>
      <line x1="200" y1="516" x2="200" y2="510"/>
      <line x1="172" y1="508" x2="176" y2="504"/>
      <line x1="160" y1="480" x2="166" y2="480"/>
      <line x1="172" y1="452" x2="176" y2="456"/>
    </g>
    <!-- lit arc = effectiveDim/3 -->
    <path d="M200 444 A36 36 0 0 1 236 480" fill="none" stroke="#7fd0a0" stroke-width="2"/>
    <text x="200" y="484" fill="#9fe0b8" font-size="9" text-anchor="middle">2.4</text>
    <text x="200" y="494" fill="#5a8a6a" font-size="6" text-anchor="middle">eff.dim</text>
    <text x="200" y="536" fill="#6a9a8a" font-size="7" text-anchor="middle">DIVERSITYRING 20x20 = 80pt | col 40, row 110 | Spec.Diversity</text>
  </g>

  <!-- =======================================================================
       PALETTE16 — the 16x16 live palette = THE SHUTTER  (ColorIdentity.palette16)
       cells: col 42 .. 58, row 145 .. 161  (KEEP — thumb zone)
       size : 16x16 cells = 64x64 pt  |  centred col = (100-16)/2 = 42
       draws: surface.palette via GridScript.capture (256 colours, row-major)
       interactive=TRUE.  TAP -> surface.step(.shutterTap)  (.live only)
       long-press-drag -> .movable lift (CellMechanics LiftPop ...)
     ======================================================================= -->
  <g>
    <!-- the 256-colour palette as a 16x16 swatch grid -->
    <rect x="168" y="580" width="64" height="64" fill="#101018"/>
    <g>
      <rect x="168" y="580" width="16" height="16" fill="#2a3f55"/><rect x="184" y="580" width="16" height="16" fill="#3a5a70"/>
      <rect x="200" y="580" width="16" height="16" fill="#5d7d94"/><rect x="216" y="580" width="16" height="16" fill="#7fa0b8"/>
      <rect x="168" y="596" width="16" height="16" fill="#3a4a3a"/><rect x="184" y="596" width="16" height="16" fill="#5a6a4a"/>
      <rect x="200" y="596" width="16" height="16" fill="#8a7a5a"/><rect x="216" y="596" width="16" height="16" fill="#b09a7a"/>
      <rect x="168" y="612" width="16" height="16" fill="#5a3a4a"/><rect x="184" y="612" width="16" height="16" fill="#7a4a5a"/>
      <rect x="200" y="612" width="16" height="16" fill="#9a6a7a"/><rect x="216" y="612" width="16" height="16" fill="#c090a0"/>
      <rect x="168" y="628" width="16" height="16" fill="#202028"/><rect x="184" y="628" width="16" height="16" fill="#404048"/>
      <rect x="200" y="628" width="16" height="16" fill="#606068"/><rect x="216" y="628" width="16" height="16" fill="#909098"/>
    </g>
    <rect x="168" y="580" width="64" height="64" fill="url(#cell)" opacity="0.4"/>
    <!-- shutter affordance ring (closure law: disc R6 + ring band 2 each side = 16) -->
    <rect x="168" y="580" width="64" height="64" fill="none" stroke="#e8e8f0" stroke-width="1.5"/>
    <text x="200" y="572" fill="#e8e8f0" font-size="9" text-anchor="middle">PALETTE16 = SHUTTER</text>
    <text x="200" y="662" fill="#c8c8d8" font-size="8" text-anchor="middle">16x16 = 64x64 pt | col 42, row 145 | TAP = .shutterTap</text>
    <!-- tap finger hint -->
    <circle cx="200" cy="612" r="30" fill="none" stroke="#e8e8f0" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.6"/>
  </g>

  <!-- =======================================================================
       DATA HEADROOM B — capture-readiness status line (rows 168..178)
       Below the shutter. ISO / exposure / "tap to capture 64" hint as cells.
       DATA: camera engine (CaptureViewModel) folded to Surface, + Spec.Significance hint.
     ======================================================================= -->
  <g>
    <rect x="120" y="688" width="160" height="28" fill="#0d141a" stroke="#22323e" stroke-width="0.5"/>
    <text x="200" y="706" fill="#6a8a9a" font-size="8" text-anchor="middle">tap to capture 64  •  ISO 320  •  1/120  (status line)</text>
    <text x="200" y="730" fill="#4a6a7a" font-size="7" text-anchor="middle">DATA HEADROOM B — col 30, rows 168-174 | camera engine -> Surface</text>
  </g>

  <!-- =======================================================================
       LEFT / RIGHT GUTTERS (cols 0-17 / 82-99) — kept quiet (live ground only).
       Reserved as future move-snap rails; no chrome in .live.
     ======================================================================= -->
  <text x="36" y="436" fill="#3a3a48" font-size="7" transform="rotate(-90 36 436)">left gutter cols 0-17 — live ground</text>
  <text x="372" y="436" fill="#3a3a48" font-size="7" transform="rotate(90 372 436)">right gutter cols 82-99 — live ground</text>

  <!-- title strip -->
  <text x="200" y="800" fill="#55556a" font-size="9" text-anchor="middle">ACT I — OPEN / LIVE  (SurfacePhase = .live)</text>
  <text x="200" y="814" fill="#44445a" font-size="7" text-anchor="middle">ONE SURFACE — every widget is a cell-grid configuration of the single field, never a view swap</text>
</svg>
